services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: czanix
      POSTGRES_USER: czanix
      POSTGRES_PASSWORD: czanix_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/infrastructure/database/migrations:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
